<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Faculty Filter Prototype</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="hero">
        <h1>Faculty Profile Explorer</h1>
        <p>
          Choose departments and countries to filter results. Multiple
          selections within a group use OR logic; selections across groups use
          AND logic.
        </p>
      </header>

      <section class="controls panel" aria-label="Filters">
        <div class="filter-row filter-row-departments">
          <div class="control-group">
            <span>Departments</span>
            <input
              id="departmentSearch"
              class="filter-search"
              type="search"
              placeholder="Search departments…"
              aria-label="Search departments"
            />
            <div
              id="departmentFilter"
              class="chip-list"
              role="group"
              aria-label="Departments"
            ></div>
          </div>
        </div>

        <div class="filter-row filter-row-country-map">
          <div class="control-group country-control-group">
            <label for="geoFilter">Countries</label>
            <input
              id="countrySearch"
              class="filter-search"
              type="search"
              placeholder="Search countries…"
              aria-label="Search countries"
            />
            <select id="geoFilter" multiple size="8"></select>
          </div>

          <section class="map-panel" aria-label="Country map filter">
            <h2>World Map</h2>
            <p class="map-help">
              Click a country on the map to add or remove it from the country
              filter.
            </p>
            <svg
              id="worldMap"
              class="world-map"
              viewBox="0 0 1000 360"
              role="img"
              aria-label="Clickable world map for country filter"
            >
              <g id="mapBase" class="map-land" aria-hidden="true"></g>
              <g id="mapCountries"></g>
            </svg>
          </section>
        </div>

        <div class="filter-row filter-row-keyword">
          <div class="control-group control-group-keyword">
            <label for="keywordSearch">Keyword search</label>
            <input
              id="keywordSearch"
              class="filter-search"
              type="search"
              placeholder="Search topics, methods, conditions, or interests"
              aria-label="Search faculty details"
            />
          </div>

          <div class="control-actions">
            <button id="clearBtn" type="button">Clear filters</button>
          </div>
        </div>
      </section>

      <section id="activeFilters" class="active-filters panel" aria-label="Active filters"></section>

      <p id="status" class="status panel">Loading faculty data…</p>

      <section id="results" class="results" aria-live="polite"></section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
