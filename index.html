<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Faculty Filter Prototype</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="hero">
        <div class="hero-content">
          <h1>Faculty Profile Explorer</h1>
          <p>Filter or search by country, department, or keyword.</p>
        </div>
        <img
          class="hero-logo"
          src="GR_logo_900px_Transp.png"
          alt="Global REACH"
          width="360"
          height="118"
          loading="eager"
          decoding="async"
        />
      </header>

      <section class="controls panel" aria-label="Filters">
        <section class="map-country-cluster" aria-label="Geography filters">
          <div class="filter-row filter-row-country-map">
            <section class="map-panel" aria-label="Country map filter">
              <h2>World Map</h2>
              <p class="map-help">
                Click a country on the map to add or remove it from the country
                filter.
              </p>
              <svg
                id="worldMap"
                class="world-map"
                viewBox="0 0 1000 360"
                role="img"
                aria-label="Clickable world map for country filter"
              >
                <g id="mapBase" class="map-land" aria-hidden="true"></g>
                <g id="mapCountries"></g>
              </svg>
            </section>

            <div class="control-group country-control-group">
              <label for="geoFilter">Countries</label>
              <select id="geoFilter" multiple size="8"></select>
            </div>
          </div>
        </section>

        <div class="filter-row filter-row-secondary">
          <div class="control-group control-group-departments">
            <span>Departments</span>
            <div
              id="departmentFilter"
              class="chip-list"
              role="group"
              aria-label="Departments"
            ></div>
          </div>

          <div class="secondary-right-column">
            <div class="control-group control-group-keyword">
              <label for="keywordSearch">Keyword search</label>
              <input
                id="keywordSearch"
                class="filter-search"
                type="search"
                aria-label="Search faculty details"
              />
            </div>

            <section
              id="activeFilters"
              class="active-filters panel"
              aria-label="Active filters"
            ></section>

            <div class="control-actions">
              <button id="clearBtn" type="button">Clear filters</button>
            </div>
          </div>
        </div>
      </section>

      <p id="status" class="status panel">Loading faculty data…</p>

      <section id="results" class="results" aria-live="polite"></section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
